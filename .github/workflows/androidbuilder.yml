name: Compilar App Android (100% en la Nube)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 3. Instalar dependencias base
        run: npm install

      - name: 4. Compilar Lightning JS al vuelo
        # Usa npx para descargar el CLI temporalmente y compilar
        run: npx @lightningjs/cli build

      - name: 5. Configurar Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: 6. Instalar herramientas de Capacitor en el servidor
        # Instala el puente nativo solo en este entorno de ejecución
        run: npm install @capacitor/cli @capacitor/android

      - name: 7. Inicializar y crear plataforma Android
        # Genera la configuración y la carpeta 'android' temporal
        run: |
          if [ ! -f capacitor.config.json ] && [ ! -f capacitor.config.ts ]; then
            # Si no existe el config, lo crea apuntando a la carpeta de Lightning (usualmente 'dist' o 'build')
            npx cap init ZappingApp com.zapping.app --web-dir dist
          fi
          npx cap add android

      - name: 8. Compilar el APK con Gradle
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: 9. Subir el APK final
        uses: actions/upload-artifact@v4
        with:
          name: zapping-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
